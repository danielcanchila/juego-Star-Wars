<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Wars — Duelo de Sables</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;font-family:'Courier New',monospace;}

/* ============================================================
   AJUSTA AQUÍ — Tamaño del juego
   Cambia 680 y 520 por el tamaño que quieras
   ============================================================ */
#w{position:relative;width:680px;height:520px;overflow:hidden;background:#000;}

canvas{display:block;}

/* HUD superior */
#hud{position:absolute;top:0;left:0;width:100%;padding:12px 14px 0;pointer-events:none;}
.bars{display:flex;align-items:flex-start;gap:10px;}
.pi{flex:1;}
.pn{font-size:9px;letter-spacing:3px;font-weight:bold;margin-bottom:4px;}
#n1{color:#44aaff;}
#n2{color:#ff3333;text-align:right;}
.hb{height:9px;background:rgba(255,255,255,0.07);border-radius:1px;overflow:hidden;margin-bottom:3px;position:relative;}
.hb::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 9px,rgba(0,0,0,0.25)1px);}

/* ============================================================
   AJUSTA AQUÍ — Colores de las barras de vida
   ============================================================ */
#h1f{height:100%;background:linear-gradient(90deg,#1166ff,#44ccff);transition:width .07s;}  /* Barra Luke */
#h2f{height:100%;background:linear-gradient(90deg,#ff4400,#ff2222);transition:width .07s;margin-left:auto;} /* Barra Vader */

.sb{height:4px;background:rgba(255,255,255,0.05);border-radius:1px;overflow:hidden;}
#s1f{height:100%;background:#00ff99;transition:width .04s;}  /* Stamina Luke */
#s2f{height:100%;background:#ffaa00;transition:width .04s;margin-left:auto;} /* Stamina Vader */
.mid{width:72px;flex-shrink:0;text-align:center;}
#rvs{font-size:8px;letter-spacing:3px;color:rgba(255,220,0,0.5);margin-bottom:2px;}
#rn{font-size:15px;color:#FFD700;font-weight:bold;}
#dts{display:flex;gap:4px;justify-content:center;margin-top:3px;}
.dt{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.12);}
.dt.w1{background:#44aaff;}
.dt.w2{background:#ff3333;}

/* Pantalla de inicio y game over */
#ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.93);z-index:20;pointer-events:all;}
.tsw{font-size:8px;letter-spacing:6px;color:rgba(255,220,0,0.4);margin-bottom:5px;}
.tm{font-size:30px;font-weight:bold;letter-spacing:5px;color:#FFD700;margin-bottom:3px;}
.ts{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.3);margin-bottom:22px;}
.vsb{display:flex;align-items:center;gap:20px;margin-bottom:22px;}
.cc{text-align:center;}
.cn{font-size:9px;letter-spacing:2px;margin-top:6px;}
.vss{font-size:18px;color:rgba(255,220,0,0.5);letter-spacing:3px;}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:6px 18px;margin-bottom:20px;}
.cr{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:1px;display:flex;align-items:center;gap:6px;}
.kk{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:2px;padding:1px 5px;font-size:9px;color:rgba(255,255,255,0.4);white-space:nowrap;}
.sb2{font-size:11px;letter-spacing:3px;color:#FFD700;background:transparent;border:1px solid rgba(255,220,0,0.4);padding:10px 30px;cursor:pointer;font-family:'Courier New',monospace;}
.sb2:hover{background:rgba(255,220,0,0.09);border-color:#FFD700;}

/* Mensajes en pantalla */
#an{position:absolute;top:43%;left:50%;transform:translate(-50%,-50%);font-size:22px;letter-spacing:5px;color:#FFD700;pointer-events:none;opacity:0;transition:opacity .2s;text-align:center;white-space:nowrap;}
#cb{position:absolute;top:88px;left:50%;transform:translateX(-50%);font-size:13px;letter-spacing:3px;color:#ffcc00;pointer-events:none;opacity:0;transition:opacity .15s;text-align:center;}
#ch{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:12px;pointer-events:none;}
.chi{font-size:9px;color:rgba(255,255,255,0.2);letter-spacing:1px;display:flex;align-items:center;gap:3px;}
#pm{position:absolute;top:74px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:2px;color:#ff8844;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap;}
</style>
</head>
<body>
<div id="w">
  <canvas id="c" width="680" height="520"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="bars">
      <div class="pi">
        <!-- ============================================================
             AJUSTA AQUÍ — Nombre del jugador 1
             ============================================================ -->
        <div class="pn" id="n1">LUKE SKYWALKER</div>
        <div class="hb"><div id="h1f" style="width:100%"></div></div>
        <div class="sb"><div id="s1f" style="width:100%"></div></div>
      </div>
      <div class="mid">
        <div id="rvs">ROUND</div>
        <div id="rn">1</div>
        <div id="dts">
          <div class="dt" id="d1"></div>
          <div class="dt" id="d2"></div>
          <div class="dt" id="d3"></div>
        </div>
      </div>
      <div class="pi" style="text-align:right">
        <!-- ============================================================
             AJUSTA AQUÍ — Nombre del jugador 2 (IA)
             ============================================================ -->
        <div class="pn" id="n2">DARTH VADER</div>
        <div class="hb" style="direction:rtl"><div id="h2f" style="width:100%"></div></div>
        <div class="sb" style="direction:rtl"><div id="s2f" style="width:100%"></div></div>
      </div>
    </div>
  </div>

  <!-- Pantalla de inicio -->
  <div id="ov">
    <div class="tsw">— STAR WARS —</div>
    <div class="tm">DUELO DE SABLES</div>
    <div class="ts">LUKE vs DARTH VADER · COLISIÓN REAL DE ESPADAS</div>
    <div class="vsb">
      <div class="cc">
        <canvas id="pl" width="80" height="105"></canvas>
        <div class="cn" style="color:#44aaff">JEDI</div>
      </div>
      <div class="vss">VS</div>
      <div class="cc">
        <canvas id="pv" width="80" height="105"></canvas>
        <div class="cn" style="color:#ff3333">SITH</div>
      </div>
    </div>
    <div class="cg">
      <div class="cr"><span class="kk">A / D</span>Moverse</div>
      <div class="cr"><span class="kk">W</span>Saltar</div>
      <div class="cr"><span class="kk">J</span>Ataque rápido</div>
      <div class="cr"><span class="kk">K</span>Ataque fuerte</div>
      <div class="cr"><span class="kk">L</span>Bloquear</div>
      <div class="cr"><span class="kk">U</span>Especial Fuerza</div>
    </div>
    <button class="sb2" id="startBtn">⚡ INICIAR DUELO</button>
  </div>

  <div id="an"></div>
  <div id="cb"></div>
  <div id="pm"></div>

  <div id="ch">
    <div class="chi"><span class="kk" style="color:rgba(255,255,255,0.2)">A D</span>mov</div>
    <div class="chi"><span class="kk" style="color:rgba(255,255,255,0.2)">W</span>saltar</div>
    <div class="chi"><span class="kk" style="color:rgba(255,255,255,0.2)">J</span>rápido</div>
    <div class="chi"><span class="kk" style="color:rgba(255,255,255,0.2)">K</span>fuerte</div>
    <div class="chi"><span class="kk" style="color:rgba(255,255,255,0.2)">L</span>bloquear</div>
    <div class="chi"><span class="kk" style="color:rgba(255,255,255,0.2)">U</span>especial</div>
  </div>
</div>

<script>
// ================================================================
//  STAR WARS — DUELO DE SABLES
//  Desarrollado con colisión real de segmentos de línea
// ================================================================

const C = document.getElementById('c');
const ctx = C.getContext('2d');

// ============================================================
// AJUSTA AQUÍ — Dimensiones del canvas
// ============================================================
const W = 680, H = 520;
const GY = H - 72; // Altura del suelo

// Teclas presionadas
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowLeft','ArrowRight',
       'KeyJ','KeyK','KeyL','KeyW','KeyA','KeyD','KeyU'].includes(e.code))
    e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Estado global
let gs = 'menu', round = 1, p1w = 0, p2w = 0;
let raf, lastT = 0, frame = 0, roundLock = false;
let particles = [], clashes = [], sparks = [];

// Estrellas de fondo
const STARS = Array.from({length: 160}, () => ({
  x: Math.random() * W,
  y: Math.random() * (H * .6),
  s: Math.random() * 1.8 + .3,
  b: Math.random()
}));

// ============================================================
// AJUSTA AQUÍ — Estadísticas de los personajes
// hp: vida máxima | st: stamina máxima
// ============================================================
function mkF(x, facingRight, isV) {
  return {
    x, y: GY, vx: 0, vy: 0,
    dir: facingRight ? 1 : -1,
    hp: 100, maxHp: 100,   // <-- Cambia vida aquí
    st: 100, maxSt: 100,   // <-- Cambia stamina aquí
    state: 'idle', stTimer: 0,
    atkTimer: 0, atkType: 'none',
    blocking: false, jumpN: 0, onGround: true,
    hitFlash: 0, specCD: 0,
    combo: 0, lastHit: 0,
    dead: false, deathT: 0,
    sAngle: 0, sAngleVel: 0,
    walkT: 0, breathT: 0,
    isV, pushVx: 0, parryWindow: 0,
    aiTimer: 0,
    aiAggr: .55 + Math.random() * .35  // <-- Agresividad IA (0.1 fácil - 1.0 difícil)
  };
}

let p1, p2;
function reset() {
  p1 = mkF(160, true, false);
  p2 = mkF(520, false, true);
  particles = []; clashes = []; sparks = [];
  roundLock = false;
}

// ============================================================
// FONDO — Espacio y escenario
// ============================================================
function drawBG() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#00000c');
  g.addColorStop(.5, '#07001a');
  g.addColorStop(1, '#030009');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  const t = Date.now() * .00022;
  [[W*.3,H*.28,150,40,240],[W*.68,H*.32,130,35,280],[W*.5,H*.15,90,25,200]]
  .forEach(([nx,ny,nr,na,nh]) => {
    const ng = ctx.createRadialGradient(nx+Math.sin(t)*18, ny+Math.cos(t*.7)*10, 0, nx, ny, nr);
    ng.addColorStop(0, `hsla(${nh},80%,20%,.${na})`);
    ng.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = ng; ctx.fillRect(0, 0, W, H);
  });

  STARS.forEach(s => {
    const fl = .35 + s.b*.65 + Math.sin(Date.now()*.0018 + s.x*.05)*.1;
    ctx.globalAlpha = fl;
    ctx.fillStyle = s.b > .75 ? '#aaccff' : '#fff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.s*.5, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  const fg = ctx.createLinearGradient(0, GY, 0, H);
  fg.addColorStop(0, '#180830'); fg.addColorStop(.4, '#0a0420'); fg.addColorStop(1, '#040010');
  ctx.fillStyle = fg; ctx.fillRect(0, GY, W, H-GY);
  ctx.strokeStyle = 'rgba(100,55,180,.5)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, GY); ctx.lineTo(W, GY); ctx.stroke();
  ctx.fillStyle = 'rgba(100,60,180,.07)';
  for (let i = 0; i < W; i += 48) ctx.fillRect(i, GY+1, 26, H-GY-1);
  for (let i = 0; i < 7; i++) {
    const px = 55+i*(W-90)/6, ph = 25+Math.sin(i*1.6)*14, pw = 18+Math.sin(i*.9)*6;
    ctx.fillStyle = 'rgba(50,20,100,.75)'; ctx.fillRect(px-pw/2, GY+4, pw, ph);
    ctx.fillStyle = 'rgba(160,100,255,.12)'; ctx.fillRect(px-pw/2, GY+4, pw, 3);
  }
}

// ============================================================
// SABLES — Posición y colisión de segmentos
// ============================================================
function getSaberSegment(f) {
  const bx = f.x + f.dir * (f.isV ? 12 : 10);
  const by = f.y - 34 + Math.sin(f.breathT) * .7;
  const len = 62; // <-- Longitud del sable
  const tx = bx + Math.cos(f.sAngle) * len * f.dir;
  const ty = by + Math.sin(f.sAngle) * len;
  return { bx, by, tx, ty };
}

// Intersección matemática de dos segmentos
function segmentsIntersect(ax1,ay1,ax2,ay2,bx1,by1,bx2,by2) {
  const d1x=ax2-ax1,d1y=ay2-ay1,d2x=bx2-bx1,d2y=by2-by1;
  const cross = d1x*d2y - d1y*d2x;
  if (Math.abs(cross) < 1e-8) return null;
  const t = ((bx1-ax1)*d2y - (by1-ay1)*d2x) / cross;
  const u = ((bx1-ax1)*d1y - (by1-ay1)*d1x) / cross;
  if (t>=0 && t<=1 && u>=0 && u<=1)
    return { x: ax1+t*d1x, y: ay1+t*d1y, t, u };
  return null;
}

function checkSaberCollision() {
  const s1 = getSaberSegment(p1), s2 = getSaberSegment(p2);
  return segmentsIntersect(s1.bx,s1.by,s1.tx,s1.ty, s2.bx,s2.by,s2.tx,s2.ty);
}

function saberTipNearBody(atk, def) {
  const s = getSaberSegment(atk);
  const dx = s.tx - def.x, dy = s.ty - (def.y - 30);
  return Math.sqrt(dx*dx + dy*dy) < 28;
}

// ============================================================
// EFECTOS DE PARTÍCULAS
// ============================================================
function spawnClashFX(x, y, c1, c2) {
  clashes.push({ x, y, l: 1, c: c1 });
  for (let i = 0; i < 22; i++) {
    const a = Math.random()*Math.PI*2, sp = 2 + Math.random()*7;
    sparks.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,l:1,d:.05+Math.random()*.06,c:Math.random()>.45?c1:c2,s:1.5+Math.random()*3});
  }
}
function spawnHitFX(x, y, c) {
  for (let i = 0; i < 16; i++) {
    const a = Math.random()*Math.PI*2, sp = 1.5 + Math.random()*5;
    sparks.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,l:1,d:.04+Math.random()*.07,c,s:2+Math.random()*4});
  }
}

// ============================================================
// DIBUJO DEL SABLE
// ============================================================
function drawSaber(f) {
  const {bx,by,tx,ty} = getSaberSegment(f);

  // ============================================================
  // AJUSTA AQUÍ — Color del sable
  // p1 = Luke (azul), p2 = Vader (rojo)
  // ============================================================
  const c = f.isV
    ? { core:'#ff2200', mid:'#ff7755', glo:'rgba(255,30,0,' }
    : { core:'#0077ff', mid:'#55ccff', glo:'rgba(0,140,255,' };

  ctx.lineCap = 'round';
  ctx.globalAlpha = .28; ctx.strokeStyle = c.glo+'0.3)'; ctx.lineWidth = 22;
  ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(tx,ty); ctx.stroke();
  ctx.globalAlpha = .45; ctx.strokeStyle = c.glo+'0.5)'; ctx.lineWidth = 11;
  ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(tx,ty); ctx.stroke();
  ctx.globalAlpha = 1; ctx.strokeStyle = c.mid; ctx.lineWidth = 4.5;
  ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(tx,ty); ctx.stroke();
  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(tx,ty); ctx.stroke();
  ctx.fillStyle = '#666'; ctx.fillRect(bx-4, by-7, 8, 14);
  ctx.fillStyle = '#999'; ctx.fillRect(bx-6.5, by-2.5, 13, 5);
  ctx.fillStyle = c.mid; ctx.beginPath(); ctx.arc(bx,by,2.5,0,Math.PI*2); ctx.fill();
}

// ============================================================
// DIBUJO DE LUKE SKYWALKER
// ============================================================
function drawLuke(f) {
  const {x,y} = f; const d = f.dir;
  const bo = Math.sin(f.breathT) * .9;
  const da = f.dead ? Math.min(1, f.deathT) : 0;
  const fl = f.hitFlash > 0 && Math.floor(Date.now()/50)%2===0;
  ctx.globalAlpha = 1 - da*.75;
  ctx.save();
  if (f.dead) { ctx.translate(x+da*d*35, y); ctx.rotate(da*d*.45); }
  else ctx.translate(x, y);
  const S = c => { ctx.fillStyle = fl ? '#fff' : c; };

  // Piernas
  S('#4a4030'); ctx.fillRect(-5.5,0,5,22); ctx.fillRect(.5,0,5,22);
  S('#3a3020'); ctx.fillRect(-6,17,5.5,9); ctx.fillRect(.5,17,5.5,9);
  // Torso
  S('#2a2818'); ctx.fillRect(-11,-40+bo,22,40);
  S('#1a1808'); ctx.fillRect(-11,-40+bo,22,6); ctx.fillRect(-11,-15+bo,22,3);
  // Brazo del sable
  S('#555040'); const ax = d*12; ctx.fillRect(ax-3.5,-38+bo,7,27);
  S('#333'); ctx.fillRect(ax-2,-11+bo,4,9);
  // Cabeza
  S('#c8a878'); ctx.beginPath(); ctx.arc(0,-48+bo,10,0,Math.PI*2); ctx.fill();
  S('#a08860'); ctx.beginPath(); ctx.arc(0,-48+bo,8,0,Math.PI*2); ctx.fill();
  // Ojo / visor
  ctx.fillStyle = fl?'#fff':'#6688cc';
  ctx.beginPath(); ctx.arc(d*2,-50+bo,3.5,0,Math.PI*2); ctx.fill();
  // Escudo si bloquea
  if (f.blocking) {
    ctx.strokeStyle = 'rgba(0,150,255,.6)'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(0,-34,36,-Math.PI*.85,-Math.PI*.15); ctx.stroke();
    ctx.strokeStyle = 'rgba(0,150,255,.15)'; ctx.lineWidth = 9;
    ctx.beginPath(); ctx.arc(0,-34,36,0,Math.PI*2); ctx.stroke();
  }
  ctx.restore(); ctx.globalAlpha = 1;
}

// ============================================================
// DIBUJO DE DARTH VADER
// ============================================================
function drawVader(f) {
  const {x,y} = f; const d = f.dir;
  const bo = Math.sin(f.breathT) * .7;
  const da = f.dead ? Math.min(1, f.deathT) : 0;
  const fl = f.hitFlash > 0 && Math.floor(Date.now()/50)%2===0;
  ctx.globalAlpha = 1 - da*.75;
  ctx.save();
  if (f.dead) { ctx.translate(x+da*d*35, y); ctx.rotate(da*d*.45); }
  else ctx.translate(x, y);

  // Piernas y botas
  ctx.fillStyle = fl?'#fff':'#0a0a0a'; ctx.fillRect(-6.5,0,6,24); ctx.fillRect(.5,0,6,24);
  ctx.fillStyle = fl?'#ddd':'#111'; ctx.fillRect(-8,17,7,9); ctx.fillRect(.5,17,7,9);
  // Torso
  ctx.fillStyle = fl?'#fff':'#080808'; ctx.fillRect(-13,-43+bo,26,43);
  ctx.fillStyle = fl?'#ddd':'#1a1a1a'; ctx.fillRect(-12,-42+bo,24,9); ctx.fillRect(-12,-17+bo,24,5);
  // Luces del pecho
  ctx.fillStyle = fl?'#eee':'#cc2200'; ctx.fillRect(-4.5,-25+bo,3.5,7); ctx.fillRect(1,-25+bo,3.5,7);
  // Brazo del sable
  const ax = d*14; ctx.fillStyle = fl?'#fff':'#0a0a0a';
  ctx.fillRect(ax-4,-42+bo,8,29);
  ctx.fillStyle = fl?'#ddd':'#1a1a1a'; ctx.fillRect(ax-2.5,-13+bo,5,9);
  // Casco
  ctx.fillStyle = fl?'#fff':'#0e0e0e';
  ctx.beginPath(); ctx.moveTo(-13,-58+bo); ctx.lineTo(13,-58+bo);
  ctx.lineTo(11,-45+bo); ctx.lineTo(-11,-45+bo); ctx.closePath(); ctx.fill();
  ctx.fillStyle = fl?'#eee':'#121212';
  ctx.beginPath(); ctx.ellipse(0,-51+bo,13,9,0,0,Math.PI*2); ctx.fill();
  // Respirador rojo
  ctx.fillStyle = '#ff0000'; ctx.fillRect(-9,-55+bo,18,4);
  ctx.fillStyle = 'rgba(255,0,0,.25)'; ctx.beginPath(); ctx.arc(d*4,-53+bo,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,.9)'; ctx.fillRect(-6,-54+bo,12,5);
  // Capa
  ctx.fillStyle = '#050505';
  ctx.save(); ctx.translate(-d*16,-31+bo);
  ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(-d*22,-4,-d*20,22);
  ctx.lineTo(-d*9,26); ctx.quadraticCurveTo(-d*3,12,0,0); ctx.closePath(); ctx.fill();
  ctx.restore();
  // Escudo si bloquea
  if (f.blocking) {
    ctx.strokeStyle = 'rgba(255,50,0,.6)'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(0,-34,36,-Math.PI*.85,-Math.PI*.15); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,50,0,.15)'; ctx.lineWidth = 9;
    ctx.beginPath(); ctx.arc(0,-34,36,0,Math.PI*2); ctx.stroke();
  }
  ctx.restore(); ctx.globalAlpha = 1;
}

function drawShadow(f) {
  const sg = ctx.createRadialGradient(f.x,GY,0,f.x,GY,26);
  sg.addColorStop(0,'rgba(0,0,0,.5)'); sg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = sg; ctx.beginPath(); ctx.ellipse(f.x,GY+3,22,6,0,0,Math.PI*2); ctx.fill();
}

function drawHitFlash(f) {
  if (f.hitFlash <= 0) return;
  f.hitFlash = Math.max(0, f.hitFlash - .065);
  const c = f.isV ? 'rgba(0,140,255,' : 'rgba(255,40,0,';
  ctx.globalAlpha = f.hitFlash * .45;
  ctx.fillStyle = c+'.7)';
  ctx.beginPath(); ctx.arc(f.x,f.y-35,36,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
}

function drawParticles() {
  sparks.forEach(p => {
    ctx.globalAlpha = p.l * .9; ctx.fillStyle = p.c;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.s*p.l,0,Math.PI*2); ctx.fill();
    p.x+=p.vx; p.y+=p.vy; p.vy+=.14; p.vx*=.93; p.l-=p.d;
  });
  sparks = sparks.filter(p => p.l > 0);
  clashes.forEach(cl => {
    ctx.globalAlpha = cl.l * .65;
    const g = ctx.createRadialGradient(cl.x,cl.y,0,cl.x,cl.y,48*cl.l);
    g.addColorStop(0,'rgba(255,255,255,.9)');
    g.addColorStop(.3, cl.c);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cl.x,cl.y,48*cl.l,0,Math.PI*2); ctx.fill();
    cl.l -= .08;
  });
  clashes = clashes.filter(c => c.l > 0);
  ctx.globalAlpha = 1;
}

// ============================================================
// MENSAJES EN PANTALLA
// ============================================================
let anT=null, cbT=null, pmT=null;
function ann(t,c,d=900) {
  const e=document.getElementById('an');
  e.textContent=t; e.style.color=c||'#FFD700'; e.style.opacity='1';
  if(anT)clearTimeout(anT); anT=setTimeout(()=>e.style.opacity='0',d);
}
function showCombo(n,c) {
  if(n<2)return;
  const e=document.getElementById('cb');
  e.textContent=`COMBO x${n}`; e.style.color=c; e.style.opacity='1';
  if(cbT)clearTimeout(cbT); cbT=setTimeout(()=>e.style.opacity='0',700);
}
function showMsg(t,c) {
  const e=document.getElementById('pm');
  e.textContent=t; e.style.color=c||'#ff8844'; e.style.opacity='1';
  if(pmT)clearTimeout(pmT); pmT=setTimeout(()=>e.style.opacity='0',1100);
}

// ============================================================
// SISTEMA DE COMBATE
// ============================================================
function doAttack(atk, def, type) {
  if (atk.atkTimer>0 || atk.st<12 || atk.state==='stagger' || atk.dead || roundLock) return;
  if (type==='special' && atk.specCD>0) return;

  // ============================================================
  // AJUSTA AQUÍ — Daño, cooldowns y costo de stamina
  // ============================================================
  const dmgMap   = { light:9,  heavy:19, special:32 };
  const cdMap    = { light:.2, heavy:.42, special:.52 };
  const stCost   = { light:13, heavy:24, special:42  };

  atk.atkTimer = cdMap[type];
  atk.atkType  = type;
  atk.state    = 'attack';
  atk.st       = Math.max(0, atk.st - stCost[type]);
  if (type === 'special') { atk.specCD = 4.5; atk.sAngleVel = atk.dir * -8; }
  else atk.sAngleVel = atk.dir * (type==='heavy' ? -6 : -4);

  if (!saberTipNearBody(atk, def) && !checkSaberCollision()) return;

  const sc = checkSaberCollision();
  if (sc && (def.blocking || def.atkTimer > 0)) {
    // Choque de sables — empuje y stamina
    const bd = type==='special' ? dmgMap[type]*.35 : .06*dmgMap[type];
    def.hp  = Math.max(0, def.hp  - bd);
    def.st  = Math.max(0, def.st  - (type==='special' ? 55 : 20));
    def.pushVx = -def.dir * (type==='heavy' ? 3 : 1.5);
    atk.pushVx = -atk.dir * (type==='heavy' ? 1.5 : .8);
    spawnClashFX(sc.x, sc.y,
      atk.isV?'rgba(255,80,0,.9)':'rgba(0,160,255,.9)',
      def.isV?'rgba(255,80,0,.9)':'rgba(0,160,255,.9)');
    if (def.parryWindow > 0) {
      showMsg('¡PARREO PERFECTO!','#ffcc00');
      atk.state='stagger'; atk.stTimer=.55; atk.pushVx=-atk.dir*5;
    } else if (def.st<=0 && type==='special') {
      def.blocking=false; showMsg('¡GUARDIA ROTA!','#ff8844');
    }
    return;
  }

  // Golpe limpio
  def.hp       = Math.max(0, def.hp - dmgMap[type]);
  def.hitFlash = 1;
  def.state    = 'stagger';
  def.stTimer  = type==='heavy' ? .38 : .22;
  def.pushVx   = atk.dir * (type==='heavy' ? 4 : 2.5);
  const now    = Date.now();
  if (now - atk.lastHit < 600) atk.combo++; else atk.combo = 1;
  atk.lastHit  = now;
  const hc     = atk.isV ? '#ff7755' : '#55ccff';
  spawnHitFX(def.x, def.y-35, hc);
  showCombo(atk.combo, hc);
  if (type === 'special') {
    for (let i=0;i<3;i++)
      setTimeout(()=>spawnHitFX(def.x+Math.random()*30-15,def.y-30+Math.random()*20-10,hc),i*90);
    ann(atk.isV?'PODER DEL LADO OSCURO':'FUERZA JEDI', atk.isV?'#ff4444':'#44ccff');
  }
}

// ============================================================
// INTELIGENCIA ARTIFICIAL DE VADER
// ============================================================
function updateAI(ai, pl, dt) {
  if (ai.dead || roundLock) return;
  ai.aiTimer -= dt;
  const dist = Math.abs(ai.x - pl.x);
  const plLow = pl.hp < 30, aiLow = ai.hp < 30;

  // Modifica agresividad según la situación
  const aggr = ai.aiAggr * (plLow ? 1.4 : 1) * (aiLow ? .65 : 1);
  if (ai.aiTimer > 0) return;
  const r = Math.random();

  if (dist > 160) {
    // Demasiado lejos — acercarse
    ai.vx = ai.dir * 4; ai.state = 'walk';
    ai.aiTimer = .08 + Math.random() * .12;
  } else if (dist > 75) {
    // Rango medio — mix de ataque y avance
    if      (r < .55*aggr) { ai.vx = ai.dir*3.5; ai.state='walk'; }
    else if (r < .70)      doAttack(ai, pl, 'light');
    else if (r < .82)      doAttack(ai, pl, 'heavy');
    else if (r < .87 && ai.specCD<=0) doAttack(ai, pl, 'special');
    else                   ai.blocking = true;
    ai.aiTimer = .09 + Math.random() * .16;
  } else {
    // Cuerpo a cuerpo
    if      (r < .30*aggr) doAttack(ai, pl, 'light');
    else if (r < .45*aggr) doAttack(ai, pl, 'heavy');
    else if (r < .52 && ai.specCD<=0) doAttack(ai, pl, 'special');
    else if (r < .65) { ai.blocking=true; ai.parryWindow=.25; }
    else if (r < .78) { ai.vx=-ai.dir*3; ai.state='walk'; }
    else if (ai.onGround && ai.jumpN<1) { ai.vy=-11; ai.jumpN++; ai.state='jump'; }
    ai.aiTimer = .06 + Math.random() * .13;
  }
  if (ai.blocking)
    setTimeout(()=>{ if(!roundLock) ai.blocking=false; }, 100+Math.random()*180);
}

// ============================================================
// ACTUALIZACIÓN DE FÍSICA Y ESTADO
// ============================================================
function updateF(f, opp, dt, isPlayer) {
  if (f.dead) { f.deathT = Math.min(1, f.deathT + dt*1.3); return; }
  f.breathT += dt * 1.1;
  f.walkT   += dt * 9;
  if (f.stTimer  > 0) { f.stTimer  -= dt; if (f.stTimer  <= 0) f.state='idle'; }
  if (f.atkTimer > 0) { f.atkTimer -= dt; if (f.atkTimer <= 0) { f.atkType='none'; } }
  if (f.specCD     > 0) f.specCD     -= dt;
  if (f.parryWindow> 0) f.parryWindow -= dt;
  f.st = Math.min(f.maxSt, f.st + 13*dt); // Regeneración de stamina

  if (isPlayer && f.state !== 'stagger') {
    if      (keys['KeyA']) { f.vx=-4.2; f.dir=-1; f.state='walk'; }
    else if (keys['KeyD']) { f.vx= 4.2; f.dir= 1; f.state='walk'; }
    else { f.vx*=.62; if(Math.abs(f.vx)<.15){f.vx=0; if(f.state==='walk')f.state='idle';} }
    if (keys['KeyW'] && f.onGround && f.jumpN<1)
      { f.vy=-12.5; f.jumpN++; f.state='jump'; f.onGround=false; }
    const wasBlocking = f.blocking;
    f.blocking = !!keys['KeyL'] && f.st > 5;
    if (f.blocking && !wasBlocking) f.parryWindow = .22; // Ventana de parreo al iniciar bloqueo
    if (keys['KeyJ']) doAttack(f, opp, 'light');
    if (keys['KeyK']) doAttack(f, opp, 'heavy');
    if (keys['KeyU']) doAttack(f, opp, 'special');
  } else if (!isPlayer) {
    updateAI(f, opp, dt);
    if (f.state !== 'walk') { f.vx*=.62; if(Math.abs(f.vx)<.1)f.vx=0; }
  }

  // Cara siempre al oponente
  if (opp.x < f.x) f.dir=-1; else f.dir=1;

  // Física
  f.x  += f.vx + f.pushVx;
  f.pushVx *= .72;
  f.vy += .58; // Gravedad
  f.y  += f.vy;
  if (f.y >= GY) { f.y=GY; f.vy=0; f.jumpN=0; f.onGround=true; if(f.state==='jump')f.state='idle'; }
  f.x = Math.max(38, Math.min(W-38, f.x));

  // Física del sable — oscilación dinámica
  const targetAngle = f.blocking ? (-f.dir*.95)
    : (f.atkType==='special' ? (-f.dir*1.6) : (f.dir>0 ? -.28 : .28));
  f.sAngleVel += (targetAngle - f.sAngle) * .25;
  f.sAngle    += f.sAngleVel * dt * 12;
  f.sAngleVel *= .7;

  // Empuje físico cuando los sables se tocan
  const sc = checkSaberCollision();
  if (sc && !f.dead && !opp.dead && !roundLock) {
    f.pushVx   = -f.dir   * 1.2;
    opp.pushVx = -opp.dir * 1.2;
    f.sAngleVel   +=  f.dir * .8;
    opp.sAngleVel += opp.dir* .8;
  }
}

// ============================================================
// LÓGICA DE RONDAS Y VICTORIA
// ============================================================
function checkDeath() {
  if (roundLock) return;
  if (p1.hp<=0 && !p1.dead) { p1.dead=true; endRound(false); }
  if (p2.hp<=0 && !p2.dead) { p2.dead=true; endRound(true);  }
}

function endRound(p1Won) {
  roundLock = true;
  if (p1Won) p1w++; else p2w++;
  updateDots();
  setTimeout(() => {
    const name = p1Won?'LUKE SKYWALKER':'DARTH VADER';
    const col  = p1Won?'#44ccff':'#ff4444';
    ann(name+' GANA LA RONDA', col, 2000);
    setTimeout(() => {
      if (p1w>=2 || p2w>=2) endGame(p1w>=2);
      else { round++; document.getElementById('rn').textContent=round; reset(); ann(`RONDA ${round}  —  LUCHA`,'#FFD700'); }
    }, 2200);
  }, 900);
}

function endGame(p1Won) {
  gs = 'gameover';
  const ov   = document.getElementById('ov');
  ov.style.display='flex';
  const col  = p1Won?'#44ccff':'#ff4444';
  const name = p1Won?'LUKE SKYWALKER':'DARTH VADER';
  // ============================================================
  // AJUSTA AQUÍ — Frases al ganar / perder
  // ============================================================
  const quote= p1Won?'"La Fuerza estará contigo... siempre."':'"Yo soy tu padre."';
  ov.innerHTML=`
    <div class="tsw">— FIN DEL DUELO —</div>
    <div class="tm" style="color:${col};font-size:22px;margin-bottom:5px;">${name}</div>
    <div class="ts">VICTORIOSO · ${p1w}-${p2w} · RONDAS: ${round}</div>
    <div style="font-size:10px;color:rgba(255,220,0,.35);letter-spacing:2px;font-style:italic;margin-bottom:22px;">${quote}</div>
    <button class="sb2" onclick="startGame()">REVANCHA</button>`;
}

function updateDots() {
  ['d1','d2','d3'].forEach((id,i)=>{
    const e=document.getElementById(id);
    e.className='dt';
    if(i<p1w) e.classList.add('w1');
    else if(i<p2w) e.classList.add('w2');
  });
}

function updateHUD() {
  document.getElementById('h1f').style.width = Math.max(0,p1.hp)+'%';
  document.getElementById('h2f').style.width = Math.max(0,p2.hp)+'%';
  document.getElementById('s1f').style.width = Math.max(0,p1.st)+'%';
  document.getElementById('s2f').style.width = Math.max(0,p2.st)+'%';
}

// ============================================================
// LOOP PRINCIPAL
// ============================================================
function loop(ts) {
  if (gs !== 'playing') return;
  const dt = Math.min((ts-lastT)/1000, .05);
  lastT = ts; frame++;
  drawBG();
  updateF(p1,p2,dt,true);
  updateF(p2,p1,dt,false);
  checkDeath();
  drawShadow(p1); drawShadow(p2);
  drawHitFlash(p1); drawHitFlash(p2);
  drawLuke(p1); drawVader(p2);
  drawSaber(p1); drawSaber(p2);
  drawParticles();
  updateHUD();
  raf = requestAnimationFrame(loop);
}

// ============================================================
// PREVIEWS EN EL MENÚ
// ============================================================
function drawPreview(id, isV) {
  const cv=document.getElementById(id); if(!cv)return;
  const c2=cv.getContext('2d'); c2.clearRect(0,0,80,105);
  c2.save(); c2.translate(40,88);
  if (isV) {
    c2.fillStyle='#080808'; c2.fillRect(-6.5,0,6,22); c2.fillRect(.5,0,6,22);
    c2.fillStyle='#111';c2.fillRect(-8,17,7,8); c2.fillRect(.5,17,7,8);
    c2.fillStyle='#070707'; c2.fillRect(-12,-41,24,41);
    c2.fillStyle='#1a1a1a'; c2.fillRect(-11,-40,22,8); c2.fillRect(-11,-16,22,4);
    c2.fillStyle='#cc2200'; c2.fillRect(-4,-24,3.5,6); c2.fillRect(1,-24,3.5,6);
    c2.fillStyle='#0d0d0d';
    c2.beginPath(); c2.moveTo(-12,-56); c2.lineTo(12,-56); c2.lineTo(10,-45); c2.lineTo(-10,-45); c2.closePath(); c2.fill();
    c2.fillStyle='#111'; c2.beginPath(); c2.ellipse(0,-50,12,8,0,0,Math.PI*2); c2.fill();
    c2.fillStyle='#ff0000'; c2.fillRect(-8,-53,16,3);
    c2.strokeStyle='rgba(255,30,0,.9)'; c2.lineWidth=4;
    c2.beginPath(); c2.moveTo(-15,35); c2.lineTo(-15,-8); c2.stroke();
    c2.strokeStyle='rgba(255,60,40,.4)'; c2.lineWidth=10;
    c2.beginPath(); c2.moveTo(-15,35); c2.lineTo(-15,-8); c2.stroke();
    c2.strokeStyle='#fff'; c2.lineWidth=1.5;
    c2.beginPath(); c2.moveTo(-15,35); c2.lineTo(-15,-8); c2.stroke();
  } else {
    c2.fillStyle='#4a4030'; c2.fillRect(-5.5,0,5,22); c2.fillRect(.5,0,5,22);
    c2.fillStyle='#3a3020'; c2.fillRect(-6,17,5.5,8); c2.fillRect(.5,17,5.5,8);
    c2.fillStyle='#2a2818'; c2.fillRect(-10,-38,20,38);
    c2.fillStyle='#1a1808'; c2.fillRect(-10,-38,20,5); c2.fillRect(-10,-14,20,3);
    c2.fillStyle='#555040'; c2.fillRect(-14.5,-36,6.5,25);
    c2.fillStyle='#c8a878'; c2.beginPath(); c2.arc(0,-47,9,0,Math.PI*2); c2.fill();
    c2.fillStyle='#a08860'; c2.beginPath(); c2.arc(0,-47,7,0,Math.PI*2); c2.fill();
    c2.fillStyle='#6688cc'; c2.beginPath(); c2.arc(2,-49,3,0,Math.PI*2); c2.fill();
    c2.strokeStyle='rgba(0,140,255,.9)'; c2.lineWidth=4;
    c2.beginPath(); c2.moveTo(15,35); c2.lineTo(15,-8); c2.stroke();
    c2.strokeStyle='rgba(80,180,255,.4)'; c2.lineWidth=10;
    c2.beginPath(); c2.moveTo(15,35); c2.lineTo(15,-8); c2.stroke();
    c2.strokeStyle='#fff'; c2.lineWidth=1.5;
    c2.beginPath(); c2.moveTo(15,35); c2.lineTo(15,-8); c2.stroke();
  }
  c2.restore();
}

function startGame() {
  gs='playing'; round=1; p1w=0; p2w=0; reset();
  document.getElementById('ov').style.display='none';
  document.getElementById('rn').textContent='1';
  updateDots();
  lastT=performance.now();
  ann('QUE EL DUELO COMIENCE','#FFD700',1400);
  if(raf)cancelAnimationFrame(raf);
  raf=requestAnimationFrame(loop);
}

window.startGame = startGame;
document.getElementById('startBtn').addEventListener('click', startGame);
drawBG();
drawPreview('pl', false);
drawPreview('pv', true);
</script>
